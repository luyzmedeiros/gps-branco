<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS KM</title>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            /* REMOVIDO: transition (para ser instantâneo) */
            display: flex;
            justify-content: center; 
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* Classes de Tema para troca imediata */
        body.day {
            background-color: #DCF2FF;
            color: #535353;
        }

        body.night {
            background-color: black;
            color: white;
        }

        #km-display {
            font-size: 60px; 
            font-weight: bold;
            font-family: Arial, sans-serif;
            white-space: nowrap; 
            text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="km-display">0 KM</div>

    <script>
        const display = document.getElementById('km-display');
        const bodyEl = document.body;

        function updateTheme() {
            const now = new Date();
            const totalMinutes = (now.getHours() * 60) + now.getMinutes();

            // Dia: 04:31 (271min) até 17:59 (1079min)
            const isDaytime = totalMinutes >= 271 && totalMinutes < 1080;

            if (isDaytime) {
                // Só altera se a classe atual não for 'day'
                if (bodyEl.className !== 'day') {
                    bodyEl.className = 'day';
                }
            } else {
                // Só altera se a classe atual não for 'night'
                if (bodyEl.className !== 'night') {
                    bodyEl.className = 'night';
                }
            }
        }

        // Executa na hora que abre o app
        updateTheme();
        
        // Verifica a cada 10 segundos para não haver atraso perceptível
        setInterval(updateTheme, 10000);

        // GPS
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const velocidadeMS = position.coords.speed;
                if (velocidadeMS && velocidadeMS > 0) {
                    const kmHora = Math.floor(velocidadeMS * 3.6);
                    display.innerText = kmHora > 4 ? `${kmHora} KM` : "0 KM";
                } else {
                    display.innerText = "0 KM";
                }
            }, null, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            });
        }

        // Bloqueios básicos
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && ['c', 'u', 's'].includes(e.key)) e.preventDefault();
        });
    </script>
</body>
</html>
